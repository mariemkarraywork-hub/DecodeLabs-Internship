<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot — Rule-Based Assistant</title>
  <meta name="description" content="An interactive rule-based AI chatbot that responds to greetings, questions, and keywords — no server needed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: rgba(16, 20, 38, 0.7);
      --surface-border: rgba(255,255,255,0.07);
      --bubble-user-bg: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
      --bubble-bot-bg: rgba(30, 35, 60, 0.8);
      --bubble-bot-border: rgba(255,255,255,0.08);
      --text-primary: #f0f4ff;
      --text-secondary: #8b9cc8;
      --text-muted: #4a5580;
      --accent: #06b6d4;
      --accent2: #8b5cf6;
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(255,255,255,0.1);
      --send-btn: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
      --font-ui: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: drift 18s infinite alternate ease-in-out;
    }
    .glow-orb-1 { width: 500px; height: 500px; background: #4f46e5; opacity: 0.12; top: -180px; left: -120px; }
    .glow-orb-2 { width: 400px; height: 400px; background: #06b6d4; opacity: 0.10; bottom: -100px; right: -80px; animation-delay: -9s; }

    @keyframes drift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(40px, 60px); }
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.8rem;
      background: rgba(8, 12, 22, 0.85);
      border-bottom: 1px solid var(--surface-border);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 0 20px rgba(79,70,229,0.35);
      animation: pulse-avatar 3s infinite ease-in-out;
    }

    @keyframes pulse-avatar {
      0%, 100% { box-shadow: 0 0 20px rgba(79,70,229,0.35); }
      50%       { box-shadow: 0 0 30px rgba(6,182,212,0.5); }
    }

    .header-info h1 {
      font-family: var(--font-ui);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(90deg, #f0f4ff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info .status {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .header-badge {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.25);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      letter-spacing: 0.3px;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .message-row {
      display: flex;
      gap: 0.75rem;
      animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
      max-width: 780px;
    }

    .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-row.bot  { align-self: flex-start; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      margin-top: 2px;
    }

    .bot .msg-avatar {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      box-shadow: 0 0 12px rgba(79,70,229,0.3);
    }

    .user .msg-avatar {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .bubble {
      padding: 0.75rem 1.1rem;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.55;
      max-width: 520px;
      word-break: break-word;
    }

    .bot .bubble {
      background: var(--bubble-bot-bg);
      border: 1px solid var(--bubble-bot-border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .user .bubble {
      background: var(--bubble-user-bg);
      border-bottom-right-radius: 4px;
      color: #ffffff;
      box-shadow: 0 4px 16px rgba(79,70,229,0.3);
    }

    .bubble-time {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      text-align: right;
    }

    .user .bubble-time { text-align: left; }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0.75rem 1rem;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); background: var(--text-muted); }
      40%            { transform: translateY(-6px); background: var(--accent); }
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0 1.5rem 0.5rem;
      position: relative;
      z-index: 1;
    }

    .quick-reply-btn {
      background: rgba(79,70,229,0.1);
      border: 1px solid rgba(79,70,229,0.25);
      color: #a5b4fc;
      font-family: var(--font-body);
      font-size: 0.78rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .quick-reply-btn:hover {
      background: rgba(79,70,229,0.22);
      border-color: rgba(79,70,229,0.5);
      color: #fff;
      transform: translateY(-1px);
    }

    .input-area {
      position: relative;
      z-index: 10;
      padding: 1rem 1.5rem 1.5rem;
      background: rgba(8, 12, 22, 0.9);
      border-top: 1px solid var(--surface-border);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 0.7rem;
      align-items: flex-end;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 16px;
      padding: 0.6rem 0.6rem 0.6rem 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-row:focus-within {
      border-color: rgba(79,70,229,0.5);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 0.2rem 0;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: var(--send-btn);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(79,70,229,0.35);
    }

    #send-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 20px rgba(79,70,229,0.5);
    }

    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      text-align: center;
    }

    @media (max-width: 600px) {
      .header-badge { display: none; }
      .bubble { max-width: 85vw; }
    }
  </style>
</head>
<body>

  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <header>
    <div class="header-brand">
      <div class="header-avatar">🤖</div>
      <div class="header-info">
        <h1>Rule-Based AI Chatbot</h1>
        <div class="status">
          <span class="status-dot"></span>
          Online — Rule Engine Active
        </div>
      </div>
    </div>
  </header>

  <div class="chat-window" id="chat-window"></div>

  <div class="quick-replies" id="quick-replies">
    <button class="quick-reply-btn" data-msg="Hello">👋 Hello</button>
    <button class="quick-reply-btn" data-msg="What can you do?">❓ What can you do?</button>
    <button class="quick-reply-btn" data-msg="What time is it?">🕐 Current time</button>
    <button class="quick-reply-btn" data-msg="greet">🌅 Smart greet</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="Type a message… (Press Enter to send)"
        rows="1"
        aria-label="Chat input"
      ></textarea>
      <button id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="hint">Press <kbd style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-size:0.72rem;">Enter</kbd> to send · <kbd style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-size:0.72rem;">Shift+Enter</kbd> for new line</p>
  </div>

  <script>
    const FALLBACK = "I do not understand.";

    const GREETING = "Hello! 👋 How can I help you today?";
    const HELP =
      "I can respond to greetings, help, time/date, and a time-based greet. " +
      "Try: hello, help, time, date, greet.";

    function timeBasedGreeting() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 12)
        return "Good morning! ☀️ How can I help you today?";
      if (hour >= 12 && hour < 18)
        return "Good afternoon! 🌤️ How can I help you today?";
      return "Good evening! 🌙 How can I help you today?";
    }

    const INTENT_MAP = {
      hello: GREETING,
      hi: GREETING,
      hey: GREETING,
      greetings: GREETING,
      help: HELP,
      "what can you do?": HELP,
      "what can you do": HELP,
      time: () =>
        `The current time is <strong>${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</strong>. ⏰`,
      "what time is it?": () =>
        `The current time is <strong>${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</strong>. ⏰`,
      "what time is it": () =>
        `The current time is <strong>${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</strong>. ⏰`,
      date: () =>
        `Today's date is <strong>${new Date().toLocaleDateString("en-GB")}</strong>. 📅`,
      "what is the date?": () =>
        `Today's date is <strong>${new Date().toLocaleDateString("en-GB")}</strong>. 📅`,
      "what is the date": () =>
        `Today's date is <strong>${new Date().toLocaleDateString("en-GB")}</strong>. 📅`,
      greet: timeBasedGreeting,
      "smart greeting": timeBasedGreeting,
      "time greeting": timeBasedGreeting,
    };

    function sanitizeInput(raw) {
      return raw.toLowerCase().trim();
    }

    function getResponse(input) {
      const clean = sanitizeInput(input);
      const response = Object.prototype.hasOwnProperty.call(INTENT_MAP, clean)
        ? INTENT_MAP[clean]
        : FALLBACK;
      return typeof response === "function" ? response() : response;
    }

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(content, role) {
      const chatWindow = document.getElementById('chat-window');
      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'bot' ? '🤖' : '🧑';

      const wrapper = document.createElement('div');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = content;

      const time = document.createElement('div');
      time.className = 'bubble-time';
      time.textContent = getTime();

      wrapper.appendChild(bubble);
      wrapper.appendChild(time);
      row.appendChild(avatar);
      row.appendChild(wrapper);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return row;
    }

    function showTyping() {
      const chatWindow = document.getElementById('chat-window');
      const row = document.createElement('div');
      row.className = 'message-row bot';
      row.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '🤖';

      const indicator = document.createElement('div');
      indicator.className = 'bubble typing-indicator';
      indicator.innerHTML = `
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      `;

      row.appendChild(avatar);
      row.appendChild(indicator);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function sendMessage(text) {
      const userText = text || document.getElementById('user-input').value.trim();
      if (!userText) return;

      document.getElementById('user-input').value = '';
      document.getElementById('user-input').style.height = 'auto';

      appendMessage(userText, 'user');
      showTyping();

      setTimeout(() => {
        removeTyping();
        const response = getResponse(userText);
        appendMessage(response, 'bot');
      }, 600 + Math.random() * 400);
    }

    document.getElementById('send-btn').addEventListener('click', () => sendMessage());

    document.getElementById('user-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById('user-input').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.querySelectorAll('.quick-reply-btn').forEach(btn => {
      btn.addEventListener('click', () => sendMessage(btn.dataset.msg));
    });

    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        showTyping();
        setTimeout(() => {
          removeTyping();
          appendMessage(
            "Hello! 👋 I'm <strong>BotAI</strong>, your rule-based AI assistant. Try <strong>hello</strong>, <strong>greet</strong> (morning/afternoon/evening by clock), or ask for the <strong>time</strong>.",
            'bot'
          );
        }, 900);
      }, 400);
    });
  </script>
</body>
</html>
